<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <!-- SEO & METADATA -->
    <meta name="description" content="Learn more about [Client Name] and their professional experience.">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://your-client-domain.com/about.html">
    
    <!-- Open Graph -->
    <meta property="og:title" content="About | Client Name">
    <meta property="og:description" content="Learn more about [Client Name] and their professional experience.">
    <meta property="og:image" content="https://your-client-domain.com/image/about/01.webp">
    <meta property="og:url" content="https://your-client-domain.com/about.html">
    <meta property="og:type" content="profile">
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="About | Client Name">
    <meta name="twitter:description" content="Learn more about [Client Name] and their professional experience.">
    <meta name="twitter:image" content="https://your-client-domain.com/image/about/01.webp">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#050505" media="(prefers-color-scheme: dark)">
    <link rel="manifest" href="manifest.json">
    <title>About | Client Name</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;600;700&display=block" rel="stylesheet">
    <script src="config.js"></script>

    <!-- JSON-LD Structured Data for Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfilePage",
      "mainEntity": {
        "@type": "Person",
        "name": "Client Name",
        "image": "https://your-client-domain.com/image/about/01.webp",
        "description": "Professional model and creative director.",
        "url": "https://your-client-domain.com/about.html"
      }
    }
    </script>
</head>
<body class="about-page">

    <script src="nav.js"></script>
    <section style="padding-top: 96px; padding-bottom: 96px; border-top: none; min-height: 100vh; display: flex; align-items: center; position: relative;">
        <div class="container">
            <div style="grid-column: span 12;">
                <h2 class="page-header reveal">
                    <span lang="en">About</span>
                    <span lang="th">เกี่ยวกับฉัน</span>
                </h2>
                <div class="split-layout" style="text-align: left;">
                    <img src="image/about/01.webp" alt="Portrait" class="reveal" loading="lazy">
                    <div class="bio reveal delay-1" id="aboutBio">
                        <!-- Populated from config.js for fast client delivery -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Y2K Scroll Indicator -->
        <div class="scroll-indicator about-scroll-indicator" onclick="window.scrollBy({top: window.innerHeight, behavior: 'smooth'})" style="top: calc(100vh - 96px); bottom: auto;"></div>
    </section>

    <section class="about-clients-section">
        <div class="container">
            <div class="client-strip about-client-strip reveal" style="grid-column: span 12;">
                <div class="client-strip__header">
                    <h2>
                        <span lang="en">Clients</span>
                        <span lang="th">ลูกค้าที่ร่วมงาน</span>
                    </h2>
                </div>
                <div class="client-strip__logos about-clients-logos reveal delay-1">
                    <img src="image/brand_icons/vogue.webp" alt="VOGUE" class="brand-logo" loading="lazy" decoding="async">
                    <img src="image/brand_icons/elle.webp" alt="ELLE" class="brand-logo" loading="lazy" decoding="async">
                    <img src="image/brand_icons/cartier.webp" alt="CARTIER" class="brand-logo" loading="lazy" decoding="async">
                    <img src="image/brand_icons/armani.webp" alt="ARMANI" class="brand-logo" loading="lazy" decoding="async">
                    <img src="image/brand_icons/levi.webp" alt="LEVI'S" class="brand-logo" loading="lazy" decoding="async">
                </div>
            </div>
        </div>
    </section>

    <section class="container" style="padding-bottom: 160px;">
        <div style="grid-column: span 12;">
            <div class="manifesto-card reveal" style="padding: 96px; border: 1px solid #eee;">
                <p class="editorial-quote">
                    <span lang="en" id="manifestoEn"></span>
                    <span lang="th" id="manifestoTh"></span>
                </p>
            </div>
            
            <div style="margin-top: 96px; text-align: center;">
                <h3 class="reveal">
                    <span lang="en">For bookings and inquiries</span>
                    <span lang="th">สำหรับการจองและติดต่อสอบถาม</span>
                </h3>
                <a href="booking.html" class="btn-bold reveal delay-1">
                    <span lang="en">Booking Page</span>
                    <span lang="th">ไปที่หน้าการจอง</span>
                </a>
            </div>
        </div>
    </section>

    <script src="footer.js"></script>
    <script src="main.js"></script>
</body>
</html>
